<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How Well Do You Know Me? ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Arial',sans-serif;
}

body{
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    background:white;
    width:90%;
    max-width:600px;
    padding:30px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

h1{
    color:#ff4d6d;
    margin-bottom:20px;
}

p{
    margin-bottom:20px;
    color:#555;
}

button{
    background:#ff4d6d;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

.option{
    display:block;
    width:100%;
    margin:10px 0;
    background:#ffe5ec;
    color:#333;
}

.option:hover{
    background:#ffccd5;
}

.hidden{
    display:none;
}

#result{
    font-size:22px;
    color:#ff4d6d;
}

.heart{
    position:fixed;
    color:#ff4d6d;
    font-size:20px;
    animation:floatUp 4s linear infinite;
}

@keyframes floatUp{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}
</style>
</head>
<body>

<div class="container">

    <div id="startScreen">
        <h1>❤️ How Well Do You Know Me? ❤️</h1>
        <p>Let's see how much you know about me!</p>
        <button onclick="startGame()">Start</button>
    </div>

    <div id="quizScreen" class="hidden">
        <h1 id="question"></h1>
        <div id="answers"></div>
    </div>

    <div id="endScreen" class="hidden">
        <h1>🎉 Congratulations! 🎉</h1>
        <p id="result"></p>
        <h2 style="color:#ff4d6d; margin-top:20px;">
            I LOVE YOU ❤️
        </h2>
        <p style="margin-top:15px;">
            Thank you for playing. You mean so much to me. 💕
        </p>
    </div>

</div>

<script>

const questions = [
{
question:"What's my favorite color?",
answers:["Pink","Blue","Green","Black"],
correct:"Pink"
},
{
question:"What's my favorite food?",
answers:["Pizza","Burger","Fries","Pasta"],
correct:"fries"
},
{
question:"What makes me happiest?",
answers:[
"Money",
"Sleeping",
"Spending time with you",
"Video games"
],
correct:"Spending time with you"
},
{
question:"Who do I love the most?",
answers:[
"Myself",
"My pet",
"You ❤️",
"My friends"
],
correct:"You ❤️"
}
];

let currentQuestion = 0;
let score = 0;

function startGame(){
document.getElementById("startScreen").classList.add("hidden");
document.getElementById("quizScreen").classList.remove("hidden");
showQuestion();
}

function showQuestion(){
const q = questions[currentQuestion];

document.getElementById("question").textContent = q.question;

const answersDiv = document.getElementById("answers");
answersDiv.innerHTML = "";

q.answers.forEach(answer => {
const btn = document.createElement("button");
btn.textContent = answer;
btn.classList.add("option");

btn.onclick = () => {
if(answer === q.correct){
score++;
}

currentQuestion++;

if(currentQuestion < questions.length){
showQuestion();
}else{
showResult();
}
};

answersDiv.appendChild(btn);
});
}

function showResult(){
document.getElementById("quizScreen").classList.add("hidden");
document.getElementById("endScreen").classList.remove("hidden");

document.getElementById("result").innerHTML =
`You got ${score} out of ${questions.length} questions right! ❤️`;

createHearts();
}

function createHearts(){
setInterval(() => {
const heart = document.createElement("div");
heart.classList.add("heart");
heart.innerHTML = "❤️";

heart.style.left = Math.random() * 100 + "vw";
heart.style.fontSize = (20 + Math.random() * 30) + "px";

document.body.appendChild(heart);

setTimeout(() => {
heart.remove();
}, 4000);

}, 250);
}

</script>

</body>
</html>
